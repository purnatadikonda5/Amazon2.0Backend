# ⚡ ADVANCED RABBITMQ: Quality of Service (Prefetch) & Delivery Assurance
# Forces consumers to process exactly 5 messages at a time preventing RAM explosion on sudden spikes!
spring.rabbitmq.listener.simple.prefetch=5
# 🧠 ADVANCED RABBITMQ: Manual Acknowledgement (Avoid Data Loss)
# Never auto-ack in production. Wait until DB writes successfully before deleting message from Cloud!
spring.rabbitmq.listener.simple.acknowledge-mode=manual

# 🛑 ADVANCED PRODUCTION: Graceful Shutdown
# WHY USE THIS: 
# When a new server deployment happens, traffic shouldn't abruptly crash. 
# This intercepts SIGTERM signals, stops accepting new Web Requests/MQ tasks, 
# and waits up to 30 seconds for active threads to finish gracefully preventing data corruption!
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# 📊 ADVANCED OBSERVABILITY: Prometheus Metrics Endpoint
# Exposes JVM memory, HikariCP Connection Pools, and RabbitMQ active threads securely. 
# Used by Grafana dashboards to monitor scaling demands!
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always